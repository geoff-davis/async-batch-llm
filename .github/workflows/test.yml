name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

# Permissions needed for coverage action to push to data branch and comment on PRs
permissions:
  contents: write
  pull-requests: write

# Serialize runs that share a ref so back-to-back main pushes don't race the
# coverage action's push to its data branch (the second push would be rejected
# non-fast-forward). Push runs queue (every commit still gets covered); PR runs
# cancel on a newer push to save CI.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v7

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        uv sync --all-extras

    - name: Run tests with coverage
      run: |
        uv run pytest tests/ -v --tb=short --cov --cov-report=term-missing --cov-report=xml

    - name: Run linter
      run: |
        uv run ruff check src/ tests/

    - name: Check formatting
      run: |
        uv run ruff format --check src/ tests/

    - name: Run type checker (mypy)
      run: |
        uv run mypy src/async_batch_llm/ --ignore-missing-imports

    - name: Run type checker (ty)
      if: matrix.python-version == '3.12'
      run: |
        uv run ty check src/

    - name: Coverage comment
      uses: py-cov-action/python-coverage-comment-action@v3
      if: matrix.python-version == '3.12'
      with:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docs-build:
    # Catch broken nav/links in PRs instead of discovering them after the
    # post-merge gh-pages deploy.
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.12

    - name: Install dependencies
      run: uv sync --extra docs

    - name: Build docs (strict)
      run: uv run mkdocs build --strict

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.12

    - name: Install dependencies
      run: |
        uv sync --all-extras

    - name: Python security audit
      # Audit the project's locked runtime deps only, not pip-audit's own
      # venv (which pulls in pip and would report CVEs in pip itself —
      # those aren't vulnerabilities users of async-batch-llm are exposed to).
      run: |
        uv export --frozen --format requirements.txt --no-dev \
          --no-emit-project -o /tmp/abl-deps.txt
        uv tool install pip-audit
        uv tool run pip-audit --disable-pip --require-hashes -r /tmp/abl-deps.txt

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'

    - name: Install npm dependencies
      run: npm ci

    - name: NPM security audit
      run: npm audit --audit-level=moderate

# Dependabot configuration.
#
# Note: grouped Dependabot *security* updates are enabled separately in the
# repo's Security settings (no config file needed) and produce the "uv group"
# PRs. This file adds scheduled *version* updates on top of that — most
# importantly, it makes Dependabot watch GitHub Actions so action deprecations
# (e.g. the Node 20 -> 24 runtime migration) surface as PRs automatically
# instead of needing a manual sweep.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      python:
        patterns:
          - "*"
